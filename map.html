<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Interactive Leaflet Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    .leaflet-popup-content-wrapper {
    max-width: 700px;
    }

    .leaflet-popup-content {
        max-width: 675px;
    }

    .leaflet-popup-content {
        font-size: 4em;
        }
  </style>
</head>

<body>
<div id="map"></div>

<script>
  // -----------------------------
  // 1. Parse URL parameters
  // -----------------------------
  const params = new URLSearchParams(window.location.search);

  // Center coordinates (viewFrom)
  const centerLat = parseFloat(params.get("centerLat")) || 45.5019; // default Montreal
  const centerLng = parseFloat(params.get("centerLng")) || -73.5674;
  const zoom = parseInt(params.get("zoom")) || 12;

  // Locations JSON (example format)
  // [{"lat":45.5,"lng":-73.6,"name":"A","url":"url for hyperlink"}]
  const locations = JSON.parse(params.get("data") || "[]");

  // -----------------------------
  // 2. Initialize map
  // -----------------------------
  const map = L.map('map').setView([centerLat, centerLng], zoom);

  // OpenStreetMap tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  // -----------------------------
  // 3. Add markers
  // -----------------------------
  const markerGroup = L.layerGroup().addTo(map); // allows easy clearing

  locations.forEach(loc => {
    const marker = L.marker([loc.lat, loc.lng]).addTo(markerGroup);

    // Popup content
    const popupContent = `${loc.name} ${loc.url}`//<a href="${loc.url}" target="_blank">+</a>`;
    marker.bindPopup(popupContent);

    // Optional: Open popup on click (default Leaflet behavior)
    marker.on('click', function(e) {
      marker.openPopup();
    });
  });

  // -----------------------------
  // 4. Close popups when clicking on the map
  // -----------------------------
  map.on('click', function() {
    map.closePopup();
  });

</script>
</body>
</html>
